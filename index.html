<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能时间管家 - Smart Time Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; color: white; padding: 2rem; max-width: 600px; }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .btn { display: inline-block; background: white; color: #667eea; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.1rem; margin: 0.5rem; transition: transform 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .btn-secondary { background: transparent; border: 2px solid white; color: white; }
        .features { margin-top: 3rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .feature { background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 12px; }
        .feature h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    </style>
    <meta http-equiv="refresh" content="0;url=login.html">
</head>
<body>
    <div class="container">
        <h1>🕐 智能时间管家</h1>
        <p>AI驱动的智能时间管理平台</p>
        <a href="login.html" class="btn">立即开始</a>
        <a href="admin.html" class="btn btn-secondary">管理后台</a>
        <div class="features">
            <div class="feature"><h3>🤖 AI智能助手</h3><p>智能时间建议</p></div>
            <div class="feature"><h3>📊 数据分析</h3><p>可视化统计</p></div>
            <div class="feature"><h3>⏰ 智能提醒</h3><p>准时提醒任务</p></div>
            <div class="feature"><h3>⏱️ 时间追踪</h3><p>记录工作时间</p></div>
        </div>
    </div>
</body>
</html>
