name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/github-pages.yml'
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend
        working-directory: ./frontend
        run: ./build.sh

      - name: Copy to root
        run: |
          cp -r frontend/build/* ./
          # 删除不需要的文件
          rm -rf README.md LICENSE || true

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4