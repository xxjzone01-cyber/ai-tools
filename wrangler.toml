# Cloudflare Pages配置文件
# 配置智能时间管家的Cloudflare Pages部署

[build]
  command = "./frontend/build.sh"

[build.environment]
  NODE_VERSION = "18"

[dev]
  command = "npm run dev"
  port = 3001

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "functions"

# 环境变量配置
[env.production]
  NODE_ENV = "production"

[env.staging]
  NODE_ENV = "staging"