<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能时间管家 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        /* 登录页面 */
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 400px; }
        .login-box h2 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        
        /* 主界面 */
        .app-container { display: none; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        
        .main { display: flex; min-height: calc(100vh - 60px); }
        .sidebar { width: 200px; background: white; padding: 1rem; border-right: 1px solid #eee; }
        .sidebar-item { padding: 0.75rem 1rem; margin: 0.25rem 0; border-radius: 6px; cursor: pointer; }
        .sidebar-item:hover, .sidebar-item.active { background: #f0f0ff; color: #667eea; }
        
        .content { flex: 1; padding: 2rem; }
        
        /* 卡片 */
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 1rem; color: #333; }
        
        /* 表单 */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .btn { background: #667eea; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #5568d3; }
        .btn-secondary { background: #999; }
        
        /* 任务列表 */
        .task-list { list-style: none; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #eee; }
        .task-item:last-child { border-bottom: none; }
        .task-title { font-weight: 500; }
        .task-priority { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .priority-HIGH { background: #fee; color: #c00; }
        .priority-MEDIUM { background: #ffe0b2; color: #f57c00; }
        .priority-LOW { background: #e8f5e9; color: #388e3c; }
        
        .task-status { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .status-TODO { background: #e3f2fd; color: #1976d2; }
        .status-IN_PROGRESS { background: #fff3e0; color: #f57c00; }
        .status-COMPLETED { background: #e8f5e9; color: #388e3c; }
        
        /* 统计 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-card .number { font-size: 2rem; font-weight: bold; }
        .stat-card .label { opacity: 0.9; }
        
        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 500px; max-width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        
        .nav-tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 1rem; }
        .nav-tab { padding: 0.75rem 1.5rem; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-tab.active { border-bottom-color: #667eea; color: #667eea; }
        
        .time-display { font-size: 3rem; text-align: center; margin: 2rem 0; font-weight: bold; color: #667eea; }
        .timer-controls { text-align: center; }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>🕐 智能时间管家</h2>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="login()" style="width: 100%;">登录</button>
            <p style="text-align: center; margin-top: 1rem; color: #666;">还没有账号？ <a href="#" onclick="showRegister()">立即注册</a></p>
        </div>
    </div>

    <!-- 注册页面 -->
    <div id="registerPage" class="login-container" style="display: none;">
        <div class="login-box">
            <h2>🕐 注册账号</h2>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="registerName" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="registerEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码">
            </div>
            <button class="btn" onclick="register()" style="width: 100%;">注册</button>
            <p style="text-align: center; margin-top: 1rem; color: #666;">已有账号？ <a href="#" onclick="showLogin()">立即登录</a></p>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="appPage" class="app-container">
        <div class="header">
            <h1>🕐 智能时间管家</h1>
            <div>
                <span id="userName" style="margin-right: 1rem;"></span>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>
        <div class="main">
            <div class="sidebar">
                <div class="sidebar-item active" onclick="showPage('dashboard')">📊 仪表盘</div>
                <div class="sidebar-item" onclick="showPage('tasks')">📝 任务管理</div>
                <div class="sidebar-item" onclick="showPage('timer')">⏱️ 时间追踪</div>
                <div class="sidebar-item" onclick="showPage('analytics')">📈 数据分析</div>
            </div>
            <div class="content">
                <!-- 仪表盘 -->
                <div id="dashboardPage">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="number" id="totalTasks">0</div>
                            <div class="label">总任务数</div>
                        </div>
                        <div class="stat-card">
                            <div class="number" id="completedTasks">0</div>
                            <div class="label">已完成</div>
                        </div>
                        <div class="stat-card">
                            <div class="number" id="pendingTasks">0</div>
                            <div class="label">进行中</div>
                        </div>
                        <div class="stat-card">
                            <div class="number" id="totalHours">0</div>
                            <div class="label">总时长(小时)</div>
                        </div>
                    </div>
                </div>

                <!-- 任务管理 -->
                <div id="tasksPage" style="display: none;">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h3>📝 我的任务</h3>
                            <button class="btn" onclick="showTaskModal()">+ 新建任务</button>
                        </div>
                        <ul class="task-list" id="taskList"></ul>
                    </div>
                </div>

                <!-- 时间追踪 -->
                <div id="timerPage" style="display: none;">
                    <div class="card">
                        <h3>⏱️ 时间追踪器</h3>
                        <div class="time-display" id="timeDisplay">00:00:00</div>
                        <div class="timer-controls">
                            <button class="btn" id="startTimerBtn" onclick="startTimer()">开始计时</button>
                            <button class="btn btn-secondary" id="stopTimerBtn" onclick="stopTimer()" style="display: none;">停止计时</button>
                        </div>
                    </div>
                    <div class="card">
                        <h3>📋 时间记录</h3>
                        <ul class="task-list" id="timeRecords"></ul>
                    </div>
                </div>

                <!-- 数据分析 -->
                <div id="analyticsPage" style="display: none;">
                    <div class="card">
                        <h3>📈 数据分析</h3>
                        <div id="analyticsContent">
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建任务弹窗 -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建任务</h3>
                <button class="modal-close" onclick="closeTaskModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>任务标题</label>
                <input type="text" id="taskTitle" placeholder="请输入任务标题">
            </div>
            <div class="form-group">
                <label>任务描述</label>
                <textarea id="taskDescription" rows="3" placeholder="请输入任务描述"></textarea>
            </div>
            <div class="form-group">
                <label>优先级</label>
                <select id="taskPriority">
                    <option value="LOW">低</option>
                    <option value="MEDIUM" selected>中</option>
                    <option value="HIGH">高</option>
                </select>
            </div>
            <button class="btn" onclick="createTask()" style="width: 100%;">创建任务</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let timerInterval = null;
        let timerStart = null;

        // 初始化
        if (token) {
            showApp();
            loadDashboard();
        }

        function showLogin() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('registerPage').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('registerPage').style.display = 'flex';
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('http://localhost:3001/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                token = data.token;
                localStorage.setItem('token', token);
                localStorage.setItem('userName', data.user.name);
                showApp();
                loadDashboard();
            } else {
                alert(data.error || '登录失败');
            }
        }

        async function register() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            const res = await fetch('http://localhost:3001/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                token = data.token;
                localStorage.setItem('token', token);
                localStorage.setItem('userName', data.user.name);
                showApp();
                loadDashboard();
            } else {
                alert(data.error || '注册失败');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
            location.reload();
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('registerPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('userName').textContent = localStorage.getItem('userName') || '';
        }

        function showPage(page) {
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('dashboardPage').style.display = 'none';
            document.getElementById('tasksPage').style.display = 'none';
            document.getElementById('timerPage').style.display = 'none';
            document.getElementById('analyticsPage').style.display = 'none';
            
            document.getElementById(page + 'Page').style.display = 'block';
            
            if (page === 'dashboard') loadDashboard();
            if (page === 'tasks') loadTasks();
            if (page === 'timer') loadTimeRecords();
            if (page === 'analytics') loadAnalytics();
        }

        async function loadDashboard() {
            const res = await fetch('http://localhost:3001/api/analytics', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('totalTasks').textContent = (data.completedTasks || 0) + (data.pendingTasks || 0);
                document.getElementById('completedTasks').textContent = data.completedTasks || 0;
                document.getElementById('pendingTasks').textContent = data.pendingTasks || 0;
                document.getElementById('totalHours').textContent = data.totalTimeHours || 0;
            }
        }

        async function loadTasks() {
            const res = await fetch('http://localhost:3001/api/tasks', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const tasks = await res.json();
            
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(task => `
                <li class="task-item">
                    <div>
                        <div class="task-title">${task.title}</div>
                        <small style="color: #666;">${task.description || ''}</small>
                    </div>
                    <div style="text-align: right;">
                        <span class="task-priority priority-${task.priority}">${task.priority}</span>
                        <span class="task-status status-${task.status}">${task.status}</span>
                    </div>
                </li>
            `).join('');
        }

        function showTaskModal() {
            document.getElementById('taskModal').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const priority = document.getElementById('taskPriority').value;
            
            const res = await fetch('http://localhost:3001/api/tasks', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ title, description, priority })
            });
            
            if (res.ok) {
                closeTaskModal();
                loadTasks();
                loadDashboard();
            } else {
                alert('创建失败');
            }
        }

        let currentTimeRecordId = null;

        async function startTimer() {
            const res = await fetch('http://localhost:3001/api/time-tracking/start', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ description: '工作中' })
            });
            
            if (res.ok) {
                const data = await res.json();
                currentTimeRecordId = data.id;
                timerStart = Date.now();
                document.getElementById('startTimerBtn').style.display = 'none';
                document.getElementById('stopTimerBtn').style.display = 'inline-block';
                
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
                    const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
                    const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
                    const s = (elapsed % 60).toString().padStart(2, '0');
                    document.getElementById('timeDisplay').textContent = `${h}:${m}:${s}`;
                }, 1000);
            }
        }

        async function stopTimer() {
            if (currentTimeRecordId) {
                await fetch(`http://localhost:3001/api/time-tracking/${currentTimeRecordId}/stop`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            }
            
            clearInterval(timerInterval);
            timerStart = null;
            currentTimeRecordId = null;
            document.getElementById('timeDisplay').textContent = '00:00:00';
            document.getElementById('startTimerBtn').style.display = 'inline-block';
            document.getElementById('stopTimerBtn').style.display = 'none';
            
            loadTimeRecords();
        }

        async function loadTimeRecords() {
            const res = await fetch('http://localhost:3001/api/time-tracking', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const records = await res.json();
            
            const list = document.getElementById('timeRecords');
            list.innerHTML = records.slice(0, 10).map(record => {
                const start = new Date(record.startTime);
                const end = record.endTime ? new Date(record.endTime) : null;
                const duration = end ? Math.round((end - start) / 60000) : '进行中';
                return `
                    <li class="task-item">
                        <div>
                            <div>${record.description || '时间记录'}</div>
                            <small>${start.toLocaleString()}</small>
                        </div>
                        <div>${typeof duration === 'number' ? duration + '分钟' : duration}</div>
                    </li>
                `;
            }).join('');
        }

        async function loadAnalytics() {
            const res = await fetch('http://localhost:3001/api/analytics', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            
            document.getElementById('analyticsContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="number">${data.weeklyTasks || 0}</div>
                        <div class="label">本周新增任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.completedTasks || 0}</div>
                        <div class="label">已完成任务</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${data.totalTimeHours || 0}</div>
                        <div class="label">总工作时间(小时)</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
