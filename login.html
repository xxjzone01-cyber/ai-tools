<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能时间管家 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #5568d3; }
        p { text-align: center; margin-top: 20px; color: #666; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .success { background: #efe; color: #060; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <!-- 登录 -->
    <div id="loginBox" class="box">
        <h2>🕐 智能时间管家</h2>
        <div id="loginError" class="error"></div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button onclick="doLogin()">登录</button>
        <p>还没有账号？ <a href="#" onclick="showRegister()">立即注册</a></p>
    </div>

    <!-- 注册 -->
    <div id="registerBox" class="box" style="display: none;">
        <h2>🕐 注册账号</h2>
        <div id="regError" class="error"></div>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="regName" placeholder="请输入姓名">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="请输入密码（至少6位）">
        </div>
        <button onclick="doRegister()">注册</button>
        <p>已有账号？ <a href="#" onclick="showLogin()">立即登录</a></p>
    </div>

    <!-- 主界面 -->
    <div id="mainBox" class="box" style="display: none;">
        <h2>欢迎，<span id="userName"></span>！</h2>
        <p style="text-align: center; margin-bottom: 20px;">🎉 登录成功！</p>
        <button onclick="goToApp()">进入管理后台</button>
        <button onclick="doLogout()" style="margin-top: 10px; background: #999;">退出登录</button>
    </div>

    <script>
        // 简单数据库
        const db = {
            users: JSON.parse(localStorage.getItem('stm_users') || '[]'),
            save: function() {
                localStorage.setItem('stm_users', JSON.stringify(this.users));
            }
        };

        function showLogin() {
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'none';
            clearErrors();
        }

        function showRegister() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'block';
            document.getElementById('mainBox').style.display = 'none';
            clearErrors();
        }

        function clearErrors() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        function doRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            console.log('注册:', name, email);
            
            if (!name || !email || !password) {
                showError('regError', '请填写所有信息');
                return;
            }
            
            if (password.length < 6) {
                showError('regError', '密码至少6位');
                return;
            }
            
            if (db.users.find(u => u.email === email)) {
                showError('regError', '该邮箱已注册');
                return;
            }
            
            const user = {
                id: 'user_' + Date.now(),
                name: name,
                email: email,
                password: password,
                created: new Date().toISOString()
            };
            
            db.users.push(user);
            db.save();
            
            console.log('注册成功:', user);
            alert('注册成功！');
            
            // 自动登录
            localStorage.setItem('stm_current', JSON.stringify(user));
            document.getElementById('userName').textContent = name;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('registerBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'block';
        }

        function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            console.log('登录:', email);
            
            const user = db.users.find(u => u.email === email && u.password === password);
            
            if (user) {
                console.log('登录成功:', user);
                localStorage.setItem('stm_current', JSON.stringify(user));
                document.getElementById('userName').textContent = user.name;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('mainBox').style.display = 'block';
            } else {
                showError('loginError', '邮箱或密码错误');
            }
        }

        function doLogout() {
            localStorage.removeItem('stm_current');
            showLogin();
        }

        function goToApp() {
            window.location.href = 'admin.html';
        }

        // 检查是否已登录
        const current = localStorage.getItem('stm_current');
        if (current) {
            const user = JSON.parse(current);
            document.getElementById('userName').textContent = user.name;
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainBox').style.display = 'block';
        }
    </script>
</body>
</html>
